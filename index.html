<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoungeConcierge - Smart Lounge Matcher</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            950: '#020617'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col antialiased">
    <div id="root"></div>

    <!-- Load Babel for browser-side JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered explicitly.', reg.scope))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>

    <!-- App Script Component -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [currentStep, setCurrentStep] = useState('SCAN_FRONT');
            
            const mockMatches = [
                { name: 'The Centurion Lounge', network: 'American Express', terminal: 'Terminal 3', accessVia: 'Amex Platinum', status: 'Best Perks', rating: '4.8' },
                { name: 'Delta SkyClub', network: 'Delta', terminal: 'Terminal 3 (Concourse B)', accessVia: 'Delta Boarding Pass + Amex Platinum', status: 'Complimentary', rating: '4.5' },
                { name: 'Plaza Premium Lounge', network: 'Priority Pass', terminal: 'Terminal 3', accessVia: 'Priority Pass Digital', status: 'Guest Fee Applies', rating: '4.1' },
            ];

            useEffect(() => {
                if (currentStep === 'PROCESSING') {
                    const timer = setTimeout(() => setCurrentStep('RESULTS'), 2200);
                    return () => clearTimeout(timer);
                }
            }, [currentStep]);

            return (
                <div className="min-h-screen flex flex-col justify-between max-w-md w-full mx-auto px-4 py-6">
                    {/* Header */}
                    <header className="border-b border-slate-800/80 bg-slate-900/50 backdrop-blur-md rounded-2xl px-6 py-4 flex items-center justify-between shadow-xl mb-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-gradient-to-tr from-amber-500 to-yellow-400 p-2 rounded-xl shadow-lg shadow-amber-500/10">
                                <svg className="w-5 h-5 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                            </div>
                            <div>
                                <h1 className="font-bold tracking-tight text-lg bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">LoungeConcierge</h1>
                                <p className="text-[10px] text-slate-400 font-medium tracking-wide">SMART ACCESS ENGINE</p>
                            </div>
                        </div>
                        <span className="text-[11px] font-semibold px-2.5 py-1 bg-slate-850 border border-slate-700 text-slate-350 rounded-full flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Sandbox Active
                        </span>
                    </header>

                    {/* App Steps Router */}
                    <div className="flex-1 flex flex-col justify-center">
                        {currentStep === 'SCAN_FRONT' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="space-y-2">
                                    <h2 className="text-2xl font-bold tracking-tight text-white">Scan Entry Pass</h2>
                                    <p className="text-slate-400 text-sm leading-relaxed">Position your boarding pass, digital Priority Pass QR, or airline membership barcode within the target frame.</p>
                                </div>
                                <div className="relative aspect-[4/3] w-full bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-2xl flex flex-col items-center justify-center">
                                    <svg className="w-12 h-12 text-slate-700 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>
                                    <span className="text-xs text-slate-500 font-mono">[ CAMERA VIEWPORT ACTIVE ]</span>
                                    <div className="absolute top-0 inset-x-0 h-0.5 bg-gradient-to-r from-transparent via-amber-400 to-transparent shadow-[0_0_12px_#fbbf24] animate-bounce"></div>
                                </div>
                                <button onClick={() => setCurrentStep('SCAN_BACK')} className="w-full bg-slate-100 hover:bg-white text-slate-950 font-semibold py-4 px-6 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-2">
                                    Proceed to Credit Card Access
                                </button>
                            </div>
                        )}

                        {currentStep === 'SCAN_BACK' && (
                            <div className="animate-fade-in space-y-6">
                                <div className="space-y-2">
                                    <span className="text-xs uppercase tracking-wider font-bold text-amber-400 bg-amber-500/10 px-2.5 py-1 rounded-md border border-amber-500/20">Step 2: Card Verification</span>
                                    <h2 className="text-2xl font-bold tracking-tight text-white">Position Credit Card Back</h2>
                                    <p className="text-slate-400 text-sm leading-relaxed">Turn your card over. We will extract payment network tiers and instantly obscure your card number digits.</p>
                                </div>
                                <div className="relative aspect-[1.58/1] w-full bg-gradient-to-b from-slate-900 to-slate-950 rounded-2xl overflow-hidden border border-slate-700/60 shadow-inner flex flex-col items-center justify-center p-6">
                                    <div className="w-full h-full border-2 border-dashed border-amber-400/40 rounded-xl relative flex flex-col justify-between p-4 bg-slate-900/50">
                                        <div className="w-12 h-8 bg-slate-800 rounded-md border border-slate-700"></div>
                                        <div className="h-7 w-4/5 bg-slate-950/90 border border-slate-800 rounded flex items-center px-2 text-slate-500 font-mono text-xs tracking-wider">
                                            <span className="text-amber-400 font-bold mr-2">🔒 AUTO-MASKING</span> **** **** **** 4321
                                        </div>
                                        <div className="flex justify-end"><div className="w-10 h-6 bg-slate-800/80 rounded"></div></div>
                                    </div>
                                </div>
                                <button onClick={() => setCurrentStep('PROCESSING')} className="w-full bg-gradient-to-r from-amber-500 to-amber-400 text-slate-950 font-bold py-4 px-6 rounded-2xl shadow-xl transition-all">
                                    Verify Perks & Run Matching Matrix
                                </button>
                            </div>
                        )}

                        {currentStep === 'PROCESSING' && (
                            <div className="animate-fade-in flex flex-col items-center justify-center text-center p-6">
                                <div className="relative w-24 h-24 mb-8">
                                    <div className="absolute inset-0 rounded-full border-4 border-amber-500/20 border-t-amber-400 animate-spin"></div>
                                </div>
                                <h3 className="text-xl font-bold text-white mb-2 tracking-tight">Evaluating Lounge Alliances...</h3>
                                <div className="text-slate-400 text-sm max-w-xs space-y-1.5 font-mono text-left">
                                    <p className="text-xs text-amber-400/80 animate-pulse">→ Cross-referencing Priority Pass rules</p>
                                    <p className="text-xs text-slate-500">→ Checking terminal locations match codes</p>
                                </div>
                            </div>
                        )}

                        {currentStep === 'RESULTS' && (
                            <div className="animate-fade-in space-y-4">
                                <div className="flex items-center justify-between mb-2">
                                    <div>
                                        <h2 className="text-2xl font-bold tracking-tight text-white">Your Best Access</h2>
                                        <p className="text-slate-400 text-xs mt-0.5">Found {mockMatches.length} valid lounge options</p>
                                    </div>
                                    <button onClick={() => setCurrentStep('SCAN_FRONT')} className="text-xs font-semibold text-amber-400 bg-amber-400/10 px-3 py-2 rounded-xl border border-amber-500/20">
                                        Scan New
                                    </button>
                                </div>

                                {mockMatches.map((lounge, i) => (
                                    <div key={i} className={`relative overflow-hidden rounded-2xl border bg-gradient-to-b p-5 ${i === 0 ? 'from-slate-900 to-slate-950 border-amber-500/40' : 'from-slate-900/90 to-slate-950/90 border-slate-800'}`}>
                                        {i === 0 && (
                                            <div className="absolute top-0 right-0 bg-gradient-to-l from-amber-500 to-yellow-400 text-slate-950 font-mono font-black text-[9px] px-3 py-1 rounded-bl-xl shadow-md">
                                                RECOMMENDED
                                            </div>
                                        )}
                                        <div className="flex items-start justify-between mb-2">
                                            <div>
                                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-400">{lounge.network}</span>
                                                <h4 className="text-lg font-bold text-white tracking-tight mt-0.5">{lounge.name}</h4>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 mb-4">
                                            <span className="text-xs bg-slate-800/80 text-slate-300 px-2.5 py-1 rounded-md border border-slate-700/50">📍 {lounge.terminal}</span>
                                            <span className={`text-xs px-2.5 py-1 rounded-md font-semibold border ${i === 0 ? 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' : 'bg-slate-800 text-slate-400 border-slate-700/50'}`}>✓ {lounge.status}</span>
                                        </div>
                                        <div className="bg-slate-950/80 border border-slate-800/80 rounded-xl p-3 flex items-center gap-3">
                                            <div className="text-xs text-slate-300 font-medium">Use card: <span className="text-amber-400 font-semibold">{lounge.accessVia}</span></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Progress Indicator Footer */}
                    {currentStep !== 'RESULTS' && currentStep !== 'PROCESSING' && (
                        <div className="mt-8 bg-slate-900/40 border border-slate-800/60 rounded-2xl p-4 flex items-center justify-between">
                            <div className="flex gap-2">
                                <div className={`h-1.5 rounded-full transition-all duration-300 ${currentStep === 'SCAN_FRONT' ? 'w-8 bg-amber-400' : 'w-2 bg-slate-700'}`}></div>
                                <div className={`h-1.5 rounded-full transition-all duration-300 ${currentStep === 'SCAN_BACK' ? 'w-8 bg-amber-400' : 'w-2 bg-slate-700'}`}></div>
                            </div>
                            <p className="text-xs text-slate-400 font-medium">Local Client-Side Isolation</p>
                        </div>
                    )}
                </div>
            );
        }

        // Fixed DOM Mounting Injection Entry point
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
